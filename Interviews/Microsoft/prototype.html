<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoreCraft — AI Product Mockups</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .slide-in-right {
    animation: slideInRight 0.28s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  .fade-up {
    animation: fadeUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-animate {
    animation: progressFill 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes progressFill {
    0%   { width: 0%; }
    60%  { width: 75%; }
    100% { width: 92%; }
  }

  .pulse-glow {
    animation: pulseGlow 1.8s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1; }
  }

  .toast-in {
    animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes toastIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .scene-card:hover .scene-overlay { opacity: 1; }
  .scene-overlay { opacity: 0; transition: opacity 0.2s; }

  /* Compare slider */
  #compareSlider { cursor: ew-resize; user-select: none; }
  .compare-left  { position: absolute; inset: 0; }
  .compare-right {
    position: absolute; top: 0; right: 0; bottom: 0;
    overflow: hidden;
    transition: width 0.05s;
  }
  .compare-divider {
    position: absolute; top: 0; bottom: 0;
    width: 2px; background: white;
    display: flex; align-items: center; justify-content: center;
    transform: translateX(-50%);
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.3));
    z-index: 10;
  }
  .compare-handle {
    width: 32px; height: 32px;
    background: white; border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
  }

  /* Custom scrollbar */
  .panel-scroll { overflow-y: auto; }
  .panel-scroll::-webkit-scrollbar { width: 4px; }
  .panel-scroll::-webkit-scrollbar-track { background: transparent; }
  .panel-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
</style>
</head>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const S = {
  screen: 'products',    // 'products' | 'detail'
  step: null,            // panel step
  placement: null,
  direction: null,
  variation: 0,
  enhanced: 0,
  allEnhanced: false,
  uploadCount: 1,
};

// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const SCENES = [
  { id: 'cozy',     name: 'Cozy bedroom',    desc: 'Warm, soft textures',     bg: 'linear-gradient(155deg,#1e0a00 0%,#5c3010 35%,#9b6030 65%,#d4986a 100%)' },
  { id: 'spa',      name: 'Spa shelf',        desc: 'Clean, minimal backdrop', bg: 'linear-gradient(155deg,#e8f4f2 0%,#cce4e0 50%,#aacfca 100%)' },
  { id: 'rainy',    name: 'Rainy window',     desc: 'Moody, atmospheric',      bg: 'linear-gradient(155deg,#08111e 0%,#182f45 40%,#274d68 70%,#3a6880 100%)' },
  { id: 'giftable', name: 'Gift setting',     desc: 'Warm, gifting context',   bg: 'linear-gradient(155deg,#1e0e00 0%,#5a2e10 40%,#966040 70%,#c8906a 100%)' },
];

const VARIATIONS = ['Natural light','Warm & intimate','Cool & moody','Soft & dreamy'];
const VAR_OVERLAYS = [
  'rgba(255,255,255,0)',
  'rgba(255,190,80,0.12)',
  'rgba(0,20,50,0.25)',
  'rgba(200,210,255,0.1)',
];

const PRODUCTS = [
  { name:'Amber & Cedar Candle', price:'$28.00', status:'Published', count:6, enhanced:'0/6', editedAgo:'2h ago'  },
  { name:'Lavender Dream',       price:'$26.00', status:'Published', count:5, enhanced:'3/5', editedAgo:'1d ago'  },
  { name:'Vanilla Bean',         price:'$24.00', status:'Draft',     count:4, enhanced:null,  editedAgo:'3h ago'  },
  { name:'Rose & Oud',           price:'$34.00', status:'Published', count:6, enhanced:'2/6', editedAgo:'5d ago'  },
  { name:'Eucalyptus Mint',      price:'$26.00', status:'Draft',     count:5, enhanced:null,  editedAgo:'12h ago' },
  { name:'Fireside Glow',        price:'$30.00', status:'Published', count:7, enhanced:'5/7', editedAgo:'1w ago'  },
  { name:'Coconut Breeze',       price:'$22.00', status:'Published', count:4, enhanced:null,  editedAgo:'2d ago'  },
  { name:'Sandalwood Dusk',      price:'$32.00', status:'Draft',     count:5, enhanced:null,  editedAgo:'4h ago'  },
  { name:'Midnight Jasmine',     price:'$29.00', status:'Published', count:6, enhanced:'1/6', editedAgo:'3d ago'  },
];

// ─────────────────────────────────────────
// SVG HELPERS
// ─────────────────────────────────────────
function candleSVG(jarFill='#f5f0e8', size=80, lit=true) {
  const s = size;
  const cx = s/2, botY = s*0.96, jarH = s*0.44, jarTop = botY - jarH;
  const jarW = s*0.46, jarX = cx - jarW/2;
  const labelH = jarH*0.38, labelY = jarTop + jarH*0.3;
  const wickX = cx, wickY = jarTop - s*0.03, wickH = s*0.1;
  const flameY = wickY - s*0.09;
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="${jarX}" y="${jarTop}" width="${jarW}" height="${jarH}" rx="${s*0.07}" fill="${jarFill}" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>
    <rect x="${jarX}" y="${labelY}" width="${jarW}" height="${labelH}" fill="rgba(180,140,90,0.45)" rx="${s*0.02}"/>
    <rect x="${jarX+jarW*0.18}" y="${labelY+labelH*0.25}" width="${jarW*0.64}" height="${s*0.025}" rx="${s*0.012}" fill="rgba(100,60,20,0.55)"/>
    <rect x="${jarX+jarW*0.26}" y="${labelY+labelH*0.55}" width="${jarW*0.48}" height="${s*0.02}" rx="${s*0.01}" fill="rgba(100,60,20,0.38)"/>
    <rect x="${wickX-s*0.018}" y="${wickY - wickH}" width="${s*0.036}" height="${wickH}" rx="${s*0.018}" fill="#4a3020"/>
    ${lit ? `
    <ellipse cx="${wickX}" cy="${flameY}" rx="${s*0.048}" ry="${s*0.09}" fill="rgba(255,200,0,0.9)"/>
    <ellipse cx="${wickX}" cy="${flameY + s*0.02}" rx="${s*0.03}" ry="${s*0.055}" fill="rgba(255,120,0,0.95)"/>
    <ellipse cx="${wickX}" cy="${flameY + s*0.04}" rx="${s*0.018}" ry="${s*0.032}" fill="rgba(255,60,0,0.9)"/>
    ` : ''}
  </svg>`;
}

function starIcon(cls='w-4 h-4') {
  return `<svg class="${cls}" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`;
}

function checkIcon(cls='w-4 h-4') {
  return `<svg class="${cls}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>`;
}

function panelHeader(showClose=true) {
  return `
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
      <div class="flex items-center gap-2">
        <span class="text-blue-500">${starIcon('w-4 h-4')}</span>
        <span class="font-semibold text-gray-900 text-sm">AI Product Mockups</span>
      </div>
      ${showClose ? `<button onclick="closePanel()" class="text-gray-400 hover:text-gray-700 transition-colors rounded-md p-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>` : ''}
    </div>`;
}

function progressDots(active) {
  // active = 1, 2, or 3
  return `<div class="flex items-center justify-center gap-1.5 py-3 border-b border-gray-100 flex-shrink-0">
    ${[1,2,3].map(n => `<div class="h-1 rounded-full transition-all ${n <= active ? 'bg-blue-500 w-8' : 'bg-gray-200 w-8'}"></div>`).join('')}
  </div>`;
}

// ─────────────────────────────────────────
// CANDLE SVG ILLUSTRATIONS
// ─────────────────────────────────────────
// jar: main body color, jarD: darker side/shadow, wax: wax surface, label/labelText: label colors, flame, glass: bool
const CANDLE_THEMES = [
  { bg:'#f4f2ee', jar:'#e8e4dc', jarD:'#ccc8c0', wax:'#f4f0e4', label:'#c8a060', labelText:'#3a2a10', flame:'#f97316', glass:false }, // Amber & Cedar — cream ceramic, kraft label
  { bg:'#f2f0f8', jar:'#9878c8', jarD:'#7858a8', wax:'#e8e0f8', label:'#ffffff', labelText:'#3c2060', flame:'#c084fc', glass:false }, // Lavender Dream — purple matte
  { bg:'#f5f5f2', jar:'rgba(210,205,195,0.5)', jarD:'rgba(160,155,140,0.65)', wax:'#f8f4ec', label:'#ffffff', labelText:'#404040', flame:'#fbbf24', glass:true  }, // Vanilla Bean — clear glass
  { bg:'#f0ebe4', jar:'#7c3818', jarD:'#581808', wax:'#e4c080', label:'#d4a040', labelText:'#2c1408', flame:'#fb923c', glass:true  }, // Rose & Oud — deep amber glass
  { bg:'#eff5f0', jar:'#8ab898', jarD:'#688878', wax:'#e4f0e4', label:'#ffffff', labelText:'#243828', flame:'#34d399', glass:false }, // Eucalyptus Mint — sage green matte
  { bg:'#eeece8', jar:'#241e1a', jarD:'#0e0a08', wax:'#e4d0b0', label:'#b87830', labelText:'#f8eed8', flame:'#f97316', glass:false }, // Fireside Glow — black matte, copper label
  { bg:'#f4f4f0', jar:'#eceae4', jarD:'#d0cec8', wax:'#f8f4ec', label:'#ffffff', labelText:'#404040', flame:'#fbbf24', glass:false }, // Coconut Breeze — white ceramic
  { bg:'#f2ede6', jar:'#9c6440', jarD:'#783820', wax:'#dfc090', label:'#f4ece0', labelText:'#3c2010', flame:'#fb923c', glass:false }, // Sandalwood Dusk — terracotta
  { bg:'#eceaf4', jar:'#38286c', jarD:'#22184c', wax:'#a898e0', label:'#5848a8', labelText:'#eeeaff', flame:'#a78bfa', glass:false }, // Midnight Jasmine — deep indigo
];

// Photorealistic candle images — one per product, matched by scent/aesthetic
const CANDLE_PHOTOS = [
  'https://images.unsplash.com/photo-1773527142335-3c3ab755509c?w=800&h=800&fit=crop&auto=format', // Amber & Cedar — glass jar soy candle with wooden lid
  'https://images.unsplash.com/photo-1716662978426-1826599fcfea?w=800&h=800&fit=crop&auto=format', // Lavender Dream — lit candle in glass jar
  'https://images.unsplash.com/photo-1760804876235-42ba2ac060f5?w=800&h=800&fit=crop&auto=format', // Vanilla Bean — white frosted candle jar, clean grey bg
  'https://images.unsplash.com/photo-1567549017270-868c6e10055b?w=800&h=800&fit=crop&auto=format', // Rose & Oud — candle in brass tray, warm honey tones
  'https://images.unsplash.com/photo-1736124708873-2cf5a128c6db?w=800&h=800&fit=crop&auto=format', // Eucalyptus Mint — white ceramic candle holder
  'https://images.unsplash.com/photo-1611522564552-fe83c5bb3e77?w=800&h=800&fit=crop&auto=format', // Fireside Glow — candle in glass vessel
  'https://images.unsplash.com/photo-1675194946046-53c9a38cecc0?w=800&h=800&fit=crop&auto=format', // Coconut Breeze — two candles, clean surface
  'https://images.unsplash.com/photo-1712148273523-f2eb850f7fc2?w=800&h=800&fit=crop&auto=format', // Sandalwood Dusk — lit candle, warm ambiance
  'https://images.unsplash.com/photo-1718881742886-d0a697345ab1?w=800&h=800&fit=crop&auto=format', // Midnight Jasmine — lit candle on table
];

function getCandleSvg(i) {
  return CANDLE_PHOTOS[i % CANDLE_PHOTOS.length];
}

// ─────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────
function renderProducts() {
  const imgUrls = PRODUCTS.map((_, i) => getCandleSvg(i));

  document.getElementById('mainContent').innerHTML = `
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <div class="flex items-center justify-between px-8 py-5 border-b border-gray-200 bg-white flex-shrink-0">
        <div>
          <h1 class="text-xl font-semibold text-gray-900">Products</h1>
          <p class="text-sm text-gray-400 mt-0.5">9 products · Maya's Candles</p>
        </div>
        <button class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-800">Add product</button>
      </div>

      <!-- Grid -->
      <div class="flex-1 overflow-y-auto p-8">
        <div class="grid grid-cols-3 gap-5">
          ${PRODUCTS.map((p,i) => `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer overflow-hidden group" onclick="goToDetail()">
              <!-- Image area -->
              <div class="relative w-full aspect-square bg-[#f0eeeb] overflow-hidden">
                <img src="${imgUrls[i]}" alt="${p.name}"
                     class="w-full h-full object-contain p-4 transition-transform duration-300 group-hover:scale-105"
                     onerror="this.style.display='none'"/>
                <!-- Status badge — top right -->
                <div class="absolute top-3 right-3">
                  <span class="text-xs px-2.5 py-1 rounded-full font-medium ${p.status==='Draft' ? 'bg-gray-700 text-white' : 'bg-white/90 text-gray-700 border border-gray-200'}">
                    ${p.status}
                  </span>
                </div>
                <!-- Bottom row: enhanced left, photos right -->
                <div class="absolute bottom-3 left-3 right-3 flex items-center justify-between">
                  ${p.enhanced ? `<span class="text-xs px-2 py-0.5 rounded-full bg-white/90 text-blue-600 flex items-center gap-1 font-medium border border-blue-100">

      <h3 class="font-semibold text-gray-900 text-base">Compare</h3>
      <p class="text-sm text-gray-500 mt-1 mb-4">Drag to compare. Tap a style below to switch.</p>

      <!-- Compare slider -->
      <div id="compareSlider" class="rounded-2xl overflow-hidden relative h-56" style="touch-action:none">
        <!-- Original -->
        <div class="compare-left bg-gradient-to-br from-amber-50 to-orange-50">
          <div class="absolute inset-0 flex items-center justify-center">
            ${candleSVG('#f5f0e8', 110)}
          </div>
          <div class="absolute top-2.5 left-2.5">
            <span class="bg-white/90 backdrop-blur-sm text-gray-700 text-xs px-2 py-1 rounded font-semibold shadow-sm">ORIGINAL</span>
          </div>
        </div>

        <!-- AI Mockup (right) -->
        <div class="compare-right" id="compareRight" style="width:50%">
          <div class="absolute inset-0" style="background:${bg};width:320px">
            <div class="absolute inset-0" style="background:${VAR_OVERLAYS[S.variation]}"></div>
            <div class="absolute inset-0 flex items-center justify-center">
              ${candleSVG(candleC, 110)}
            </div>
          </div>
          <div class="absolute top-2.5 right-2.5">
            <span class="bg-blue-500 text-white text-xs px-2 py-1 rounded font-semibold shadow-sm">AI MOCKUP</span>
          </div>
        </div>

        <!-- Divider handle -->
        <div class="compare-divider" id="compareDivider" style="left:50%">
          <div class="compare-handle">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Style switcher -->
      <div class="mt-4">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2.5">Choose style</p>
        <div class="grid grid-cols-2 gap-2">
          ${VARIATIONS.map((v,i) => `
            <button onclick="selectVariation(${i}); renderPanel();"
              class="relative rounded-lg overflow-hidden border-2 transition-all text-left
                ${S.variation===i ? 'border-blue-500' : 'border-transparent hover:border-gray-200'}">
              <div class="h-14 relative" style="background:${bg}">
                <div class="absolute inset-0" style="background:${VAR_OVERLAYS[i]}"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                  ${candleSVG(candleC, 36)}
                </div>
              </div>
              <div class="px-2 py-1.5 bg-white">
                <div class="text-xs font-semibold text-gray-900">${v}</div>
                <div class="text-xs ${S.variation===i ? 'text-blue-500' : 'text-gray-400'}">
                  ${S.variation===i ? 'Selected' : 'Tap to preview'}
                </div>
              </div>
            </button>`).join('')}
        </div>
      </div>
    </div>
    <div class="p-5 border-t border-gray-100 flex-shrink-0">
      <button onclick="go('apply')" class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold text-sm hover:bg-gray-800 transition-colors">
        Use this mockup
      </button>
    </div>`;
}

function stepApply() {
  S.enhanced = 1;
  renderDetail(); // update main content with 1/6

  const scene = SCENES.find(s=>s.id===S.direction);
  const bg = scene?.bg || SCENES[0].bg;
  const candleC = scene?.id==='spa' ? '#e8f4f0' : '#d0e8f8';

  return panelHeader() + `
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-up">
      <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mb-5">
        ${checkIcon('w-7 h-7 text-green-500')}
      </div>
      <h3 class="font-semibold text-gray-900 text-base">Looking good!</h3>
      <p class="text-sm text-gray-500 mt-2">This photo has been enhanced. Apply the same style to all photos for a consistent storefront?</p>

      <!-- Preview -->
      <div class="mt-5 w-full rounded-2xl overflow-hidden h-36 relative" style="background:${bg}">
        <div class="absolute inset-0" style="background:${VAR_OVERLAYS[S.variation]}"></div>
        <div class="absolute inset-0 flex items-center justify-center">
          ${candleSVG(candleC, 90)}
        </div>
      </div>
    </div>
    <div class="p-5 border-t border-gray-100 flex-shrink-0 space-y-2">
      <button onclick="applyAll()"
        class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold text-sm hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
        ${starIcon('w-4 h-4')}
        Apply style to all 6 photos
      </button>
      <button onclick="applyOne()"
        class="w-full border border-gray-200 text-gray-700 py-3 rounded-xl font-semibold text-sm hover:bg-gray-50 transition-colors">
        Just this photo
      </button>
      <button onclick="go('results')" class="w-full text-gray-400 text-sm py-2 hover:text-gray-600 transition-colors">
        Choose a different mockup
      </button>
    </div>`;
}

function stepApplyAll() {
  return panelHeader() + `
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-up">
      <div class="w-14 h-14 bg-green-50 rounded-full flex items-center justify-center mb-5">
        ${checkIcon('w-7 h-7 text-green-500')}
      </div>
      <h3 class="font-semibold text-gray-900 text-base">Ready to review</h3>
      <p class="text-sm text-gray-500 mt-2">All 6 photos now share the same style. Close this panel to preview the updated gallery and click through the thumbnails.</p>
    </div>
    <div class="p-5 border-t border-gray-100 flex-shrink-0 space-y-2">
      <button onclick="handlePublish()"
        class="w-full bg-gray-900 text-white py-3 rounded-xl font-semibold text-sm hover:bg-gray-800 transition-colors">
        Publish
      </button>
      <button onclick="go('results')" class="w-full text-gray-400 text-sm py-2 hover:text-gray-600 transition-colors">
        Undo & choose different style
      </button>
    </div>`;
}

// ─────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────
function go(step) {
  S.step = step;
  // Refresh panel with animation
  const panel = document.getElementById('panel');
  panel.classList.remove('slide-in-right');
  void panel.offsetWidth; // reflow
  panel.classList.add('slide-in-right');
  renderPanel();
}

function openPanel(step) {
  S.step = step;
  const panel = document.getElementById('panel');
  panel.classList.remove('hidden');
  panel.classList.remove('slide-in-right');
  void panel.offsetWidth;
  panel.classList.add('slide-in-right');
  renderPanel();
}

function closePanel() {
  S.step = null;
  document.getElementById('panel').classList.add('hidden');
  renderDetail();
}

function goToProducts() {
  Object.assign(S, { screen:'products', step:null, placement:null, direction:null, variation:0, enhanced:0, allEnhanced:false, uploadCount:1, uploadedPhotos:[], published:false });
  document.getElementById('panel').classList.add('hidden');
  renderProducts();
}

function goToDetail() {
  S.screen = 'detail';
  renderDetail();
}

function triggerFileInput() {
  // Re-use or create file input outside the panel so it persists
  let input = document.getElementById('photoFileInput');
  if (!input) {
    input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;
    input.id = 'photoFileInput';
    input.style.display = 'none';
    input.onchange = (e) => handleFileUpload(e.target);
    document.body.appendChild(input);
  }
  input.value = '';
  input.click();
}

function handleFileUpload(input) {
  if (!input.files || !input.files.length) return;
  if (!S.uploadedPhotos) S.uploadedPhotos = [];
  const remaining = 10 - S.uploadedPhotos.length;
  const files = Array.from(input.files).slice(0, remaining);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      S.uploadedPhotos.push(e.target.result);
      loaded++;
      if (loaded === files.length) renderPanel();
    };
    reader.readAsDataURL(file);
  });
}

function removePhoto(index) {
  if (S.uploadedPhotos) {
    S.uploadedPhotos.splice(index, 1);
    renderPanel();
  }
}

function addPhoto() { triggerFileInput(); }
function selectPlacement(id) { S.placement = id; renderPanel(); }
function selectDirection(id) { S.direction = id; renderPanel(); }
function selectVariation(i)  { S.variation = i;  renderPanel(); }

function applyAll() {
  S.enhanced = 6;
  S.allEnhanced = true;
  renderDetail();
  go('applyAll');
}

function applyOne() {
  S.enhanced = 1;
  closePanel();
}

function handlePublish() {
  closePanel();
  const toast = document.getElementById('toast');
  toast.classList.remove('hidden');
  toast.classList.add('toast-in');
  // Show "Back to Products" button in the header after publishing
  S.published = true;
  renderDetail();
  setTimeout(() => {
    toast.classList.add('hidden');
  }, 4500);
}

// ─────────────────────────────────────────
// COMPARE SLIDER
// ─────────────────────────────────────────
function initCompareSlider() {
  const slider = document.getElementById('compareSlider');
  if (!slider) return;
  let dragging = false;

  const setPos = (x) => {
    const rect = slider.getBoundingClientRect();
    const pct = Math.max(5, Math.min(95, ((x - rect.left) / rect.width) * 100));
    const right = document.getElementById('compareRight');
    const divider = document.getElementById('compareDivider');
    if (right) right.style.width = (100 - pct) + '%';
    if (divider) divider.style.left = pct + '%';
  };

  slider.addEventListener('mousedown', e => { dragging = true; setPos(e.clientX); e.preventDefault(); });
  document.addEventListener('mousemove', e => { if (dragging) setPos(e.clientX); });
  document.addEventListener('mouseup', () => { dragging = false; });
  slider.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('touchmove', e => { if (dragging) setPos(e.touches[0].clientX); }, {passive:true});
  document.addEventListener('touchend', () => { dragging = false; });
}

// Re-init compare slider after panel renders
const _renderPanel = renderPanel;
window.renderPanel = function() {
  _renderPanel();
  setTimeout(initCompareSlider, 50);
};

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderProducts();
</script>
</body>
